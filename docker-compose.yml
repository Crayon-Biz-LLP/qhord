version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: control_tower
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/control_tower
      JWT_SECRET: development-jwt-secret-change-me
      BCRYPT_SALT_ROUNDS: 12
      ENCRYPTION_SECRET: development-encryption-secret-change-me
      APOLLO_BASE_URL: https://api.apollo.io
      CLAY_BASE_URL: https://api.clay.run
      HEYREACH_BASE_URL: https://api.heyreach.io
      SMARTLEAD_BASE_URL: https://server.smartlead.ai/api/v1
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://backend:4000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

